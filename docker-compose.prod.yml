# CRX Cloud — Production
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=https://cloud.crx.team
      - API_URL_INTERNAL=http://backend:8080
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=prod
      - DATABASE_URL=postgresql+asyncpg://crxcloud:${DB_PASSWORD}@db:5432/crxcloud
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: crxcloud
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: crxcloud
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
