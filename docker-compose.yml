# CRX Cloud — Development
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL_INTERNAL=http://backend:8080
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - API_URL_INTERNAL=http://backend:8080
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql+asyncpg://crxcloud:crxcloud@db:5432/crxcloud
      - JWT_SECRET=dev-jwt-secret-change-in-prod
      - HETZNER_API_TOKEN=JPijBH3wPUYDtEUsp0AwJMP6p5g7FAXV4nVeeUg3Xe6WtDZTZYiCTelatk7kQSRq
      - DIGITALOCEAN_API_TOKEN=${DIGITALOCEAN_API_TOKEN:-}
      - VULTR_API_KEY=${VULTR_API_KEY:-}
      - LINODE_API_TOKEN=${LINODE_API_TOKEN:-}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: crxcloud
      POSTGRES_PASSWORD: crxcloud
      POSTGRES_DB: crxcloud
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crxcloud"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  pgdata:
