# CRX Cloud — Development
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=dev
      - DATABASE_URL=postgresql+asyncpg://crxcloud:crxcloud@db:5432/crxcloud
    volumes:
      - ./backend:/app
    depends_on:
      - db

  db:
    image: postgres:17-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: crxcloud
      POSTGRES_PASSWORD: crxcloud
      POSTGRES_DB: crxcloud
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
